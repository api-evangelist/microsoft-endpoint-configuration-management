specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Microsoft Endpoint Configuration Management
providerId: microsoft-endpoint-configuration-management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Endpoint Management
  - Configuration Manager
  - ConfigMgr
  - Microsoft
description: Microsoft Configuration Manager is an on-premises product whose primary admin surfaces (SMS
  Provider over WMI, AdminService REST, Configuration Manager console) run inside the customer's site
  server. There are no published per-second / per-minute throttling limits; performance is bounded by
  the customer's site server capacity, SQL Server tier, and AdminService IIS host. For cloud-attached
  scenarios (CMG, co-management with Intune), Microsoft Graph and Intune throttling limits apply to the
  cloud calls — see those providers.
sources:
  - https://learn.microsoft.com/en-us/intune/configmgr/develop/adminservice/overview
  - https://learn.microsoft.com/en-us/intune/configmgr/develop/core/servers/manage/configuration-manager-extensions-for-windows-powershell
notes: No public numeric throttling limits are published for Configuration Manager on-premises APIs. Cloud-attach
  paths inherit Microsoft Graph and Intune limits documented at those providers.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: SMS Provider (WMI / PowerShell)
    scope: site-server
    metric: varies
    limit: bounded by site server CPU and SQL Server capacity
  - name: AdminService REST API
    scope: site-server
    metric: varies
    limit: bounded by IIS host capacity on the SMS Provider role
  - name: Cloud-attach (CMG, co-management)
    scope: tenant
    metric: varies
    limit: inherits Microsoft Graph and Intune throttling limits
policies:
  - name: On-premises sizing
    description: Scale the site server, SQL tier, and management points to match client population; Microsoft
      publishes sizing guidance per role.
  - name: Cloud-attach inheritance
    description: When co-managed with Intune, requests routed to Microsoft Graph and Intune are subject
      to those services' published throttling limits.
  - name: Backoff Strategy
    description: AdminService clients should treat 429 / 503 with exponential backoff and honour Retry-After
      when returned.
maintainers:
