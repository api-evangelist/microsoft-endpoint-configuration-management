specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Endpoint Configuration Management
providerId: microsoft-endpoint-configuration-management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Endpoint Management
  - Configuration Manager
  - ConfigMgr
  - SCCM
  - Intune Family
  - Microsoft
description: Microsoft Configuration Manager (formerly System Center Configuration Manager / SCCM, now
  part of the Microsoft Intune family) is licensed per managed device. There is no public per-device standalone
  list price; entitlement is acquired through Microsoft 365 E3/E5, Microsoft Intune Plan 1 (which grants
  co-management rights), or via a System Center / Core CAL Suite agreement under an Enterprise Agreement.
  The administration surface (SMS Provider, AdminService REST API, WMI) is included with the licensed
  on-premises product at no incremental per-call charge.
sources:
  - https://learn.microsoft.com/en-us/intune/configmgr/core/understand/configuration-manager-faq
  - https://learn.microsoft.com/en-us/intune/configmgr/comanage/overview
  - https://www.microsoft.com/en-us/security/business/microsoft-intune-pricing
plans:
  - id: microsoft-endpoint-configuration-management-via-intune
    name: Configuration Manager via Microsoft Intune Plan 1
    type: subscription
    description: Microsoft Intune Plan 1 includes co-management rights for Configuration Manager on Windows
      PCs. This is the most common modern licensing path.
    entries:
      - label: Microsoft Intune Plan 1 (per user, annual commitment)
        name: intune_plan_1
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '8.00'
        userMultiplied: true
    elements:
      - name: Co-management rights for Configuration Manager
      - name: Cross-platform endpoint management
      - name: Built-in endpoint security
      - name: Microsoft Configuration Manager
  - id: microsoft-endpoint-configuration-management-via-m365
    name: Configuration Manager via Microsoft 365 E3 / E5
    type: subscription
    description: Microsoft 365 E3 and E5 include Configuration Manager + Intune co-management rights as
      part of the seat licence.
    entries:
      - label: Microsoft 365 E3 (per user, annual)
        name: m365_e3
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '36.00'
        userMultiplied: true
      - label: Microsoft 365 E5 (per user, annual)
        name: m365_e5
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '57.00'
        userMultiplied: true
    elements:
      - name: Configuration Manager + Intune co-management
      - name: Office apps, Windows, Entra ID P1/P2
  - id: microsoft-endpoint-configuration-management-system-center
    name: Configuration Manager via System Center / Core CAL Suite
    type: enterprise
    description: Legacy path via System Center Configuration Manager Client Management Licence (CML) bundled
      in the Core CAL Suite or sold per device under an Enterprise Agreement.
    entries:
      - label: System Center / Core CAL Suite per device
        name: system_center_cml
        type: subscription
        metric: device
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Per-device Client Management License
      - name: Available under Microsoft Enterprise Agreement
      - name: Includes server CALs for legacy on-premises sites
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
