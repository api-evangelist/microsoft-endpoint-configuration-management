naftiko: 1.0.0-alpha2
info:
  label: Microsoft Endpoint Configuration Management Intune Data Warehouse API — Applications
  description: 'Microsoft Endpoint Configuration Management Intune Data Warehouse API — Applications. 2 operations. Lead operation:
    Microsoft Endpoint Configuration Management List application records. Self-contained Naftiko capability covering one Microsoft
    Endpoint Configuration Management business surface.'
  tags:
  - Microsoft Endpoint Configuration Management
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_ENDPOINT_CONFIGURATION_MANAGEMENT_API_KEY: MICROSOFT_ENDPOINT_CONFIGURATION_MANAGEMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: intune-data-warehouse-applications
    baseUri: https://fef.{location}.manage.microsoft.com/ReportingService/DataWarehouseFEService
    description: Microsoft Endpoint Configuration Management Intune Data Warehouse API — Applications business capability.
      Self-contained, no shared references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: Microsoft Endpoint Configuration Management List application records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mobileAppInstallStatuses
      path: /mobileAppInstallStatuses
      operations:
      - name: listmobileappinstallstatuses
        method: GET
        description: Microsoft Endpoint Configuration Management List mobile app install statuses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_ENDPOINT_CONFIGURATION_MANAGEMENT_API_KEY}}'
  exposes:
  - type: rest
    namespace: intune-data-warehouse-applications-rest
    port: 8080
    description: REST adapter for Microsoft Endpoint Configuration Management Intune Data Warehouse API — Applications. One
      Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: listapplications
        description: Microsoft Endpoint Configuration Management List application records
        call: intune-data-warehouse-applications.listapplications
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mobileappinstallstatuses
      name: mobileappinstallstatuses
      description: REST surface for mobileAppInstallStatuses.
      operations:
      - method: GET
        name: listmobileappinstallstatuses
        description: Microsoft Endpoint Configuration Management List mobile app install statuses
        call: intune-data-warehouse-applications.listmobileappinstallstatuses
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: intune-data-warehouse-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Endpoint Configuration Management Intune Data Warehouse API — Applications. One
      tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-endpoint-configuration-management-list
      description: Microsoft Endpoint Configuration Management List application records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: intune-data-warehouse-applications.listapplications
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-endpoint-configuration-management-list-2
      description: Microsoft Endpoint Configuration Management List mobile app install statuses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: intune-data-warehouse-applications.listmobileappinstallstatuses
      outputParameters:
      - type: object
        mapping: $.
