naftiko: 1.0.0-alpha2
info:
  label: Microsoft Endpoint Configuration Management Configuration Manager REST API (AdminService) — Site Administration
  description: 'Microsoft Endpoint Configuration Management Configuration Manager REST API (AdminService) — Site Administration.
    1 operations. Lead operation: Microsoft Endpoint Configuration Management List sites. Self-contained Naftiko capability
    covering one Microsoft Endpoint Configuration Management business surface.'
  tags:
  - Microsoft Endpoint Configuration Management
  - Site Administration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_ENDPOINT_CONFIGURATION_MANAGEMENT_API_KEY: MICROSOFT_ENDPOINT_CONFIGURATION_MANAGEMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: configmgr-rest-site-administration
    baseUri: https://{siteserver}/AdminService
    description: Microsoft Endpoint Configuration Management Configuration Manager REST API (AdminService) — Site Administration
      business capability. Self-contained, no shared references.
    resources:
    - name: wmi-SMS_Site
      path: /wmi/SMS_Site
      operations:
      - name: listsites
        method: GET
        description: Microsoft Endpoint Configuration Management List sites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_ENDPOINT_CONFIGURATION_MANAGEMENT_API_KEY}}'
  exposes:
  - type: rest
    namespace: configmgr-rest-site-administration-rest
    port: 8080
    description: REST adapter for Microsoft Endpoint Configuration Management Configuration Manager REST API (AdminService)
      — Site Administration. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/wmi/sms-site
      name: wmi-sms-site
      description: REST surface for wmi-SMS_Site.
      operations:
      - method: GET
        name: listsites
        description: Microsoft Endpoint Configuration Management List sites
        call: configmgr-rest-site-administration.listsites
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configmgr-rest-site-administration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Endpoint Configuration Management Configuration Manager REST API (AdminService)
      — Site Administration. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-endpoint-configuration-management-list
      description: Microsoft Endpoint Configuration Management List sites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configmgr-rest-site-administration.listsites
      outputParameters:
      - type: object
        mapping: $.
