specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Microsoft Endpoint Configuration Management
providerId: microsoft-endpoint-configuration-management
publisherName: Microsoft Corporation
serviceCategory: Endpoint Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Endpoint Management
  - Configuration Manager
  - Microsoft
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Microsoft Configuration Manager: per-user (Microsoft 365 / Intune)
  or per-device (System Center / Core CAL) subscription bundled with the Microsoft Intune family or an
  Enterprise Agreement; no per-call API charge.'
sources:
  - https://learn.microsoft.com/en-us/intune/configmgr/core/understand/configuration-manager-faq
  - https://www.microsoft.com/en-us/security/business/microsoft-intune-pricing
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Microsoft Configuration Manager
  ServiceCategory: Endpoint Management
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: managed_devices
    description: Count of devices currently managed by a Configuration Manager site
    unit: device
    aggregation: max
    dimensions:
      - site
      - device_type
      - os
  - name: intune_seats
    description: Microsoft Intune Plan 1 seats granting Configuration Manager co-management rights
    unit: seat
    aggregation: sum
    dimensions:
      - tenant
      - sku
  - name: m365_seats
    description: Microsoft 365 E3 / E5 seats that include Configuration Manager + Intune entitlement
    unit: seat
    aggregation: sum
    dimensions:
      - tenant
      - sku
  - name: cmg_egress
    description: Cloud Management Gateway data egress (Azure)
    unit: GB
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Configuration Manager console + AdminService REST API for on-prem inventory;
      Microsoft 365 admin centre and Cost Management for the seat licences.
  - name: Allocation
    description: Tag managed devices with collection / OU / cost-centre; flow seat costs from Microsoft
      365 admin centre to teams.
  - name: Optimization
    description: Consolidate Configuration Manager sites to reduce SQL and management-point footprint;
      use co-management with Intune to retire legacy site servers; right-size the Cloud Management Gateway.
  - name: Accountability
    description: Endpoint engineering owns site-server health and CMG sizing; IT finance owns the M365
      / Intune SKU mix.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
