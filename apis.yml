name: Microsoft Endpoint Configuration Management
description: >-
  Microsoft Endpoint Configuration Management (formerly System Center
  Configuration Manager) provides comprehensive management of devices and
  applications across an enterprise. It enables IT administrators to manage PCs,
  servers, and mobile devices, deploy software, manage compliance, and protect
  data.
image: https://docs.microsoft.com/en-us/mem/configmgr/core/media/configmgr-logo.png
url: https://learn.microsoft.com/en-us/intune/configmgr/
created: '2024'
modified: '2026-03-16'
specificationVersion: '0.18'
tags:
- Endpoint Management
- Device Management
